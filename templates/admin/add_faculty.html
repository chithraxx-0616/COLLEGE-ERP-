{% extends "base.html" %}
{% block title %}Add Faculty{% endblock %}
{% block page_title %}Add New Faculty{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-person-badge me-2"></i>Faculty Details
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-600">Login Username</label>
              <input type="text" name="username"
                     class="form-control" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600">Login Password</label>
              <input type="password" name="password"
                     class="form-control" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600">Full Name</label>
              <input type="text" name="full_name"
                     class="form-control" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600">Department</label>
              <select name="department" class="form-select" required>
                <option value="">Select Department</option>
                {% for dept in depts %}
                <option value="{{ dept }}">{{ dept }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600">Designation</label>
              <select name="designation" class="form-select" required>
                <option value="">Select Designation</option>
                <option>Assistant Professor</option>
                <option>Associate Professor</option>
                <option>Professor</option>
                <option>HOD & Professor</option>
                <option>Visiting Faculty</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600">Role</label>
              <select name="role" class="form-select" required>
                <option value="faculty">Faculty</option>
                <option value="hod">HOD</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600">Email</label>
              <input type="email" name="email"
                     class="form-control" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600">Phone</label>
              <input type="text" name="phone"
                     class="form-control"/>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-person-plus me-1"></i>Add Faculty
            </button>
            <a href="/admin/faculty" class="btn btn-outline-secondary">
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
