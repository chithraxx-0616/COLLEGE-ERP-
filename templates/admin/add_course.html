{% extends "base.html" %}
{% block title %}Add Course{% endblock %}
{% block page_title %}Add New Course{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-book me-2"></i>Course Details
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-600">Course Code</label>
              <input type="text" name="code"
                     class="form-control" required
                     placeholder="e.g. CS101"/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600">Course Name</label>
              <input type="text" name="name"
                     class="form-control" required
                     placeholder="e.g. Data Structures"/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600">Department</label>
              <select name="department" class="form-select" required>
                <option value="">Select Department</option>
                {% for dept in depts %}
                <option value="{{ dept }}">{{ dept }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-600">Credits</label>
              <select name="credits" class="form-select">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3" selected>3</option>
                <option value="4">4</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-600">Assign Faculty</label>
              <select name="faculty_id" class="form-select">
                <option value="">Not Assigned</option>
                {% for f in faculty %}
                <option value="{{ f.id }}">
                  {{ f.full_name }} ({{ f.department }})
                </option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div class="mt-4 d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-plus-circle me-1"></i>Add Course
            </button>
            <a href="/admin/courses" class="btn btn-outline-secondary">
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
