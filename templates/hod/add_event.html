{% extends "base.html" %}
{% block title %}Add Event{% endblock %}
{% block page_title %}Add New Event{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-calendar-plus me-2"></i>Event Details
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-600">Event Title</label>
            <input type="text" name="title"
                   class="form-control" required
                   placeholder="e.g. Tech Fest 2025"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-600">Description</label>
            <textarea name="description" class="form-control"
                      rows="3"
                      placeholder="Event details..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-600">Event Date</label>
            <input type="date" name="event_date"
                   class="form-control" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-600">Department</label>
            <select name="department" class="form-select">
              <option value="{{ dept }}">
                {{ dept }} (My Department)
              </option>
              <option value="ALL">ALL Departments</option>
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-calendar-plus me-1"></i>Add Event
            </button>
            <a href="/hod/events"
               class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
